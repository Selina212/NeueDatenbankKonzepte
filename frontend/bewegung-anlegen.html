<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bewegung anlegen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Neue Bewegung</h1>

<form id="bewegung-form">
    <label>Typ:</label>
    <select name="typ">
        <option value="Eingang">Eingang</option>
        <option value="Ausgang">Ausgang</option>
    </select>

    <label>Menge:</label>
    <input type="number" name="menge" required>

    <label>Grund:</label>
    <input type="text" name="grund" required>

    <label>Produkt:</label>
    <select name="produkt_id" id="produkt-select"></select>

    <label>Lagerort:</label>
    <select name="lagerort_id" id="lagerort-select"></select>

    <button type="submit">Speichern</button>
</form>


<script src="script.js"></script>
<script>
    loadProdukteDropdown();
    loadLagerorteDropdown();
    initBewegungForm();
</script>

</body>
</html>
